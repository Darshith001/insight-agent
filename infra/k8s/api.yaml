apiVersion: apps/v1
kind: Deployment
metadata: { name: insight-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: insight-api } }
  template:
    metadata: { labels: { app: insight-api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/insight-agent-api:latest
          ports: [{ containerPort: 8000 }]
          envFrom: [{ secretRef: { name: insight-env } }]
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
---
apiVersion: v1
kind: Service
metadata: { name: insight-api }
spec:
  selector: { app: insight-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: insight-api }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: insight-api }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
