name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install
        run: |
          pip install -U pip uv
          uv pip install --system -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: pytest -q tests/

  eval-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: python
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.0
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: |
          pip install -U pip uv
          uv pip install --system -e ".[dev]"
      - name: Seed sample doc
        run: python -m services.ingestion.pipeline README.md insightagent-readme
        env:
          QDRANT_URL: http://localhost:6333
      - name: RAGAS eval gate
        run: python evals/run_ragas.py --golden evals/golden_set.jsonl
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QDRANT_URL: http://localhost:6333

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
